# Build a signed Library APK and publish it as a GitHub Release.
# The in-app updater reads /repos/{owner}/{repo}/releases/latest for a .apk asset.
#
# Trigger:
#   - workflow_dispatch (set versionName + versionCode)
#   - push tag matching android-v* (e.g. android-v1.5+6)
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64  — base64 of your .jks / .keystore
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD

name: Android APK release

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: "versionName (e.g. 1.5)"
        required: true
        type: string
      versionCode:
        description: "versionCode integer (must increase each release)"
        required: true
        type: string
  push:
    tags:
      - "android-v*"

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NAME="${{ inputs.versionName }}"
            CODE="${{ inputs.versionCode }}"
          else
            REF="${GITHUB_REF_NAME}"
            NAME="${REF#android-v}"
            NAME="${NAME#v}"
            if [[ "$REF" =~ \+([0-9]+)$ ]]; then
              CODE="${BASH_REMATCH[1]}"
              NAME="${NAME%+*}"
            else
              echo "Tag pushes must look like android-v1.5+6 (versionName+versionCode)" >&2
              exit 1
            fi
          fi
          echo "versionName=$NAME" >> "$GITHUB_OUTPUT"
          echo "versionCode=$CODE" >> "$GITHUB_OUTPUT"
          echo "tag=android-v${NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "platform-tools"
          yes | sdkmanager --licenses >/dev/null || true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps & build web
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npx cap sync android

      - name: Patch Android version
        working-directory: frontend/android/app
        shell: bash
        run: |
          NAME="${{ steps.ver.outputs.versionName }}"
          CODE="${{ steps.ver.outputs.versionCode }}"
          sed -i "s/versionCode [0-9]\\+/versionCode ${CODE}/" build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${NAME}\"/" build.gradle
          grep -E 'versionCode|versionName' build.gradle

      - name: Decode keystore
        working-directory: frontend/android
        shell: bash
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is empty" >&2
            exit 1
          fi
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          test -s release.keystore
          {
            echo "storeFile=release.keystore"
            echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}"
          } > keystore.properties
          ls -la release.keystore keystore.properties

      - name: Build release APK
        working-directory: frontend/android
        run: |
          chmod +x gradlew gradlew.bat 2>/dev/null || true
          bash ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Prepare artifact
        id: apk
        shell: bash
        run: |
          SRC="frontend/android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$SRC" ]; then
            echo "APK not found at $SRC" >&2
            find frontend/android/app/build/outputs -type f -name '*.apk' || true
            exit 1
          fi
          NAME="Library-${{ steps.ver.outputs.versionName }}.apk"
          cp "$SRC" "$NAME"
          echo "path=$NAME" >> "$GITHUB_OUTPUT"
          ls -la "$NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Library Android ${{ steps.ver.outputs.versionName }}
          body: |
            Library Android APK

            versionName: ${{ steps.ver.outputs.versionName }}
            versionCode: ${{ steps.ver.outputs.versionCode }}

            Install from the in-app **Settings → Android app update** screen, or download the `.apk` below.
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: false
