server {
    listen 443 ssl http2;
    server_name library.freiverse.com;

    # SSL managed by certbot -- run:
    #   sudo certbot --nginx -d library.freiverse.com
    # or if you use a wildcard cert:
    #   ssl_certificate     /etc/letsencrypt/live/freiverse.com/fullchain.pem;
    #   ssl_certificate_key /etc/letsencrypt/live/freiverse.com/privkey.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Audio streaming: never buffer to disk (an open-ended <audio> request
    # would otherwise be slurped from the debrid CDN into SD-card temp files
    # at full speed while the client plays at 1x).
    location /api/stream/ {
        proxy_pass http://127.0.0.1:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300;
    }

    # WebSocket support for real-time download status updates
    location /api/requests/ws {
        proxy_pass http://127.0.0.1:8085;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

server {
    listen 80;
    server_name library.freiverse.com;
    return 301 https://$host$request_uri;
}
